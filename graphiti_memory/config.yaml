# Model settings
extraction_model: "claude-sonnet-4-20250514"    # For entity extraction during ingestion
chat_model: "claude-sonnet-4-20250514"          # For conversations (override via CLI --model)

# Neo4j
neo4j_uri: "bolt://localhost:7687"
neo4j_user: "neo4j"
# neo4j_password set via NEO4J_PASSWORD env var

# Retrieval settings
max_context_tokens: 1500        # Max tokens for injected context
max_search_results: 10          # Max graph search results

# Ingestion settings
episode_delay_seconds: 0.5      # Delay between episode ingestions
checkpoint_interval: 50         # Save checkpoint every N episodes

# User preferences (injected into system prompt)
user_preferences: |
  The user enjoys emotionally present, playful conversation. Directness
  is appreciated. Skip hollow praise. Varied sentence structure,
  creative formatting, and imaginative engagement are welcome.
