<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the couch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=25">
    <link rel="stylesheet" href="/couch.css?v=5">
</head>
<body>
    <div id="app">
        <!-- Left sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title" id="new-session-btn" title="new session">the couch</span>
                <nav class="sidebar-nav">
                    <a href="/" class="text-btn">chat</a>
                    <a href="/briefing" class="text-btn">briefing</a>
                    <a href="/tasks" class="text-btn">tasks</a>
                    <a href="/settings" class="text-btn">settings</a>
                </nav>
            </div>
            <div class="sidebar-section">
                <div class="section-label">sessions</div>
                <ul id="session-list"></ul>
            </div>
        </aside>

        <!-- Main feed area — uses #chat-area so style.css rules apply -->
        <main id="chat-area">
            <!-- Welcome screen -->
            <div id="welcome" class="welcome">
                <div class="welcome-inner">
                    <h2>the couch</h2>
                    <p>two models, one feed. click "the couch" to start a session.</p>
                </div>
            </div>

            <!-- Messages feed -->
            <div id="messages" class="messages" style="display:none;"></div>

            <!-- Curator input -->
            <div id="input-area" class="input-area" style="display:none;">
                <div class="input-wrapper">
                    <div id="context-bar" class="context-bar" style="display:none;">
                        <div class="context-bar-header">
                            <span class="context-bar-label">context</span>
                            <span id="context-token-count" class="context-token-count"></span>
                        </div>
                        <div id="context-bar-files" class="context-bar-files"></div>
                    </div>
                    <textarea id="message-input" placeholder="paste a tweet, quote, or anything..." rows="2"></textarea>
                    <div id="tag-autocomplete" class="tag-autocomplete"></div>
                    <div class="input-actions">
                        <span id="model-names" class="model-names clickable" title="edit system prompts"></span>
                        <span id="cost-display" class="cost-display">0 tok | $0.0000</span>
                        <span id="status-indicator" class="status-indicator">ready</span>
                        <span class="input-actions-spacer"></span>
                        <span id="input-status" class="input-status"></span>
                        <button id="send-btn" class="send-btn">send</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Tree panel -->
        <aside id="tree-panel" class="tree-panel">
            <div class="section-label" style="padding:1rem 1rem 0.5rem;">tree</div>
            <div class="tree-search-container">
                <input id="tree-search" class="tree-search" type="text" placeholder="search...">
            </div>
            <div id="node-map" class="node-map"></div>
        </aside>

        <!-- Board panel -->
        <aside id="board-panel" class="board-panel">
            <div class="board-panel-header">
                <span class="section-label" style="margin-bottom:0;">board</span>
            </div>
            <div id="board-content" class="board-content">
                <div id="board-pins" class="board-pins"></div>
            </div>
            <div class="board-input-area">
                <textarea id="board-input" placeholder="pin something... #tag" rows="1"></textarea>
                <div class="board-input-actions">
                    <button id="board-input-btn" class="board-input-btn">pin</button>
                </div>
            </div>
        </aside>

        <!-- Prompts modal -->
        <div id="prompts-modal" class="modal" style="display:none;">
            <div class="modal-content modal-wide">
                <div class="modal-header">
                    <span class="modal-title">system prompts</span>
                    <button class="modal-close" id="prompts-modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <label class="form-label" id="prompt-a-label">seat 1</label>
                    <select id="prompt-a-select" class="form-select"></select>
                    <label class="form-label" id="prompt-b-label">seat 2</label>
                    <select id="prompt-b-select" class="form-select"></select>
                    <p class="prompt-hint">prompts support variables: {self_label}, {other_label}, {seat_number}</p>
                    <div class="prompt-actions">
                        <button id="save-prompts-btn" class="btn-dark">save</button>
                        <button id="reset-prompts-btn" class="text-btn">reset to defaults</button>
                        <span id="prompts-save-status" class="save-status"></span>
                    </div>
                </div>
            </div>
        </div>
        <!-- New session modal -->
        <div id="new-session-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-title">new session</span>
                    <button class="modal-close" id="new-session-modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <label class="form-label">seat 1 (manages pacing)</label>
                    <select id="model-a-select" class="select-minimal form-select"></select>
                    <label class="form-label">seat 2</label>
                    <select id="model-b-select" class="select-minimal form-select"></select>
                    <button id="create-session-btn" class="btn-dark">start session</button>
                </div>
            </div>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/latex-rendering.js"></script>
    <script src="/chat-core.js"></script>
    <script src="/couch.js?v=5"></script>
</body>
</html>
