<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/settings.css">
</head>
<body>
    <div id="settings-page">
        <header class="settings-header">
            <h1 class="settings-title">settings</h1>
            <nav class="settings-nav">
                <a href="/" class="nav-link">chat</a>
                <a href="/briefing" class="nav-link">briefing</a>
                <a href="/tasks" class="nav-link">tasks</a>
                <a href="/" class="nav-link">backrooms</a>
            </nav>
        </header>
        <form id="settings-form" autocomplete="off">
            <label class="form-label" for="default-model">default model</label>
            <select id="default-model" class="form-select"></select>

            <label class="form-label" for="universal-prompt-select">universal prompt</label>
            <select id="universal-prompt-select" class="form-select">
                <option value="">(none)</option>
            </select>

            <div class="form-actions">
                <button type="submit" class="btn-dark">save</button>
                <span id="save-status" class="save-status"></span>
            </div>
        </form>

        <section class="prompts-section">
            <h2 class="section-heading">chat prompts</h2>
            <div id="prompts-list" class="prompts-list"></div>
            <div class="prompts-add">
                <input id="new-prompt-name" class="form-input" placeholder="prompt name..." />
                <textarea id="new-prompt-content" class="form-textarea" rows="3" placeholder="prompt content..."></textarea>
                <button id="add-prompt-btn" class="btn-dark" type="button">add prompt</button>
            </div>
        </section>

        <section class="prompts-section">
            <h2 class="section-heading">backrooms prompts</h2>
            <div id="backrooms-prompts-list" class="prompts-list"></div>
            <div class="prompts-add">
                <input id="new-backrooms-prompt-name" class="form-input" placeholder="prompt name..." />
                <textarea id="new-backrooms-prompt-content" class="form-textarea" rows="3" placeholder="prompt content..."></textarea>
                <button id="add-backrooms-prompt-btn" class="btn-dark" type="button">add prompt</button>
            </div>

            <div class="suffix-section">
                <h3 class="suffix-heading">seat suffixes</h3>
                <p class="suffix-hint">appended to each seat's system prompt regardless of which prompt is selected. variables: <code>{self_label}</code>, <code>{other_label}</code>, <code>{seat_number}</code></p>
                <label class="form-label" for="seat-1-suffix">seat 1 suffix</label>
                <textarea id="seat-1-suffix" class="form-textarea" rows="3" placeholder="e.g. end your message with [ready] when the thread has run its course..."></textarea>
                <label class="form-label" for="seat-2-suffix">seat 2 suffix</label>
                <textarea id="seat-2-suffix" class="form-textarea" rows="3" placeholder="e.g. additional instructions for seat 2..."></textarea>
                <div class="form-actions">
                    <button id="save-suffixes-btn" class="btn-dark" type="button">save suffixes</button>
                    <span id="suffix-save-status" class="save-status"></span>
                </div>
            </div>
        </section>
    </div>
    <script src="/settings.js"></script>
</body>
</html>
