<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/settings.css">
</head>
<body>
    <div id="app" class="app-simple">
        <button id="menu-btn" class="menu-btn">&#9776;</button>
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

        <aside id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">settings</span>
                <nav class="sidebar-nav">
                    <a href="/" class="text-btn">chat</a>
                    <span id="plugin-nav"></span>
                    <a href="/" class="text-btn">backrooms</a>
                </nav>
                <script src="/nav-loader.js"></script>
            </div>
        </aside>

        <main class="page-content">
            <form id="settings-form" autocomplete="off">
                <label class="form-label" for="default-model">default model</label>
                <select id="default-model" class="form-select"></select>

                <label class="form-label" for="universal-prompt-select">universal prompt</label>
                <select id="universal-prompt-select" class="form-select">
                    <option value="">(none)</option>
                </select>

                <label class="form-label" style="margin-top: 1rem;">
                    <input type="checkbox" id="memory-auto-inject" />
                    auto-inject memory context
                    <span style="opacity: 0.6; font-size: 0.85em; display: block;">searches your knowledge graph before each message and injects relevant context into the system prompt</span>
                </label>

                <div class="form-actions">
                    <button type="submit" class="btn-dark">save</button>
                    <span id="save-status" class="save-status"></span>
                </div>
            </form>

            <section class="prompts-section">
                <h2 class="section-heading">chat prompts</h2>
                <div id="prompts-list" class="prompts-list"></div>
                <div class="prompts-add">
                    <button id="add-prompt-btn" class="text-btn" type="button">+ add</button>
                    <div id="add-prompt-form" class="prompts-add-form">
                        <input id="new-prompt-name" class="form-input" placeholder="prompt name..." />
                        <textarea id="new-prompt-content" class="form-textarea" rows="3" placeholder="prompt content..."></textarea>
                        <div class="prompt-edit-actions">
                            <button class="text-btn" type="button" data-cancel="chat">cancel</button>
                            <button class="btn-dark" type="button" data-save="chat">save</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="prompts-section">
                <h2 class="section-heading">backrooms prompts</h2>
                <div id="backrooms-prompts-list" class="prompts-list"></div>
                <div class="prompts-add">
                    <button id="add-backrooms-prompt-btn" class="text-btn" type="button">+ add</button>
                    <div id="add-backrooms-prompt-form" class="prompts-add-form">
                        <input id="new-backrooms-prompt-name" class="form-input" placeholder="prompt name..." />
                        <textarea id="new-backrooms-prompt-content" class="form-textarea" rows="3" placeholder="prompt content..."></textarea>
                        <div class="prompt-edit-actions">
                            <button class="text-btn" type="button" data-cancel="backrooms">cancel</button>
                            <button class="btn-dark" type="button" data-save="backrooms">save</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="prompts-section">
                <h2 class="section-heading">seat suffixes</h2>
                <p class="suffix-hint">appended to each seat's system prompt. variables: <code>{self_label}</code>, <code>{other_label}</code>, <code>{seat_number}</code></p>

                <label class="form-label" for="seat-1-suffix-select">seat 1</label>
                <select id="seat-1-suffix-select" class="form-select"></select>

                <label class="form-label" for="seat-2-suffix-select">seat 2</label>
                <select id="seat-2-suffix-select" class="form-select"></select>

                <div class="form-actions">
                    <button id="save-suffixes-btn" class="btn-dark" type="button">save</button>
                    <span id="suffix-save-status" class="save-status"></span>
                </div>

                <div id="suffix-prompts-list" class="prompts-list"></div>
                <div class="prompts-add">
                    <button id="add-suffix-prompt-btn" class="text-btn" type="button">+ add</button>
                    <div id="add-suffix-prompt-form" class="prompts-add-form">
                        <input id="new-suffix-prompt-name" class="form-input" placeholder="suffix name..." />
                        <textarea id="new-suffix-prompt-content" class="form-textarea" rows="3" placeholder="e.g. try to ask more questions than you answer..."></textarea>
                        <div class="prompt-edit-actions">
                            <button class="text-btn" type="button" data-cancel="suffix">cancel</button>
                            <button class="btn-dark" type="button" data-save="suffix">save</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="/settings.js"></script>
    <script>
    // Mobile sidebar toggle (shared pattern with chat/briefing)
    const menuBtn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");
    const backdrop = document.getElementById("sidebar-backdrop");
    function toggleSidebar(open) {
        const show = open !== undefined ? open : !sidebar.classList.contains("open");
        sidebar.classList.toggle("open", show);
        backdrop.classList.toggle("open", show);
    }
    if (menuBtn) menuBtn.onclick = () => toggleSidebar();
    if (backdrop) backdrop.onclick = () => toggleSidebar(false);
    </script>
</body>
</html>
