<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Wrapper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=10">
</head>
<body>
    <div id="app">
        <!-- Left sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title" id="new-chat-btn" title="new conversation">claude</span>
                <nav class="sidebar-nav">
                    <a href="/briefing" class="text-btn">briefing</a>
                    <a href="/tasks" class="text-btn">tasks</a>
                    <a href="/couch" class="text-btn">couch</a>
                    <a href="#" id="files-nav-btn" class="text-btn">files</a>
                    <a href="/settings" class="text-btn">settings</a>
                </nav>
            </div>
            <div class="sidebar-section">
                <div class="section-label">conversations</div>
                <ul id="conversation-list"></ul>
            </div>
        </aside>

        <!-- Main chat area -->
        <main id="chat-area">
            <!-- Welcome screen -->
            <div id="welcome" class="welcome">
                <div class="welcome-inner">
                    <h2>claude</h2>
                    <p>start a new conversation or pick one from the sidebar.</p>
                </div>
            </div>

            <!-- Chat header -->
            <div id="chat-header" class="chat-header" style="display:none;">
                <div class="chat-header-left">
                    <select id="model-select" class="select-minimal"></select>
                    <select id="prompt-select" class="select-minimal"></select>
                </div>
                <div class="chat-header-right">
                    <label class="thinking-toggle">
                        <input type="checkbox" id="thinking-checkbox">
                        <span>thinking</span>
                    </label>
                    <span id="cost-display" class="cost-display">0 tokens | $0.0000</span>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages" class="messages" style="display:none;"></div>

            <!-- Input area -->
            <div id="input-area" class="input-area" style="display:none;">
                <div class="input-wrapper">
                    <div id="context-bar" class="context-bar" style="display:none;">
                        <div class="context-bar-header">
                            <span class="context-bar-label">context</span>
                            <span id="context-token-count" class="context-token-count"></span>
                        </div>
                        <div id="context-bar-files" class="context-bar-files"></div>
                    </div>
                    <textarea id="message-input" placeholder="message..." rows="1"></textarea>
                    <div id="tag-autocomplete" class="tag-autocomplete"></div>
                    <div class="input-actions">
                        <span id="input-status" class="input-status"></span>
                        <button id="send-btn" class="send-btn">send</button>
                        <button id="stop-btn" class="stop-btn" style="display:none;">stop</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right tree panel -->
        <aside id="tree-panel" class="tree-panel" style="display:none;">
            <div class="section-label" style="padding:1rem 1rem 0.5rem;">tree</div>
            <div id="tree-search-container" class="tree-search-container">
                <input id="tree-search" class="tree-search" type="text" placeholder="search...">
            </div>
            <div id="node-map" class="node-map"></div>
        </aside>

    </div>

    <!-- File management modal -->
    <div id="file-modal" class="modal" style="display:none;">
        <div class="modal-content" style="width:600px;">
            <div class="modal-header">
                <span class="modal-title">files</span>
                <button class="modal-close" id="file-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="file-upload-area" id="file-upload-area">
                    <input type="file" id="file-upload-input" accept=".pdf,.md" multiple style="display:none;">
                    <div class="file-upload-label">drop .pdf or .md files here, or <a href="#" id="file-upload-link">browse</a></div>
                    <div class="file-upload-tags">
                        <input type="text" id="file-upload-tags-input" placeholder="tags (comma-separated)" class="file-tags-input">
                    </div>
                </div>
                <div class="file-filter-row">
                    <span class="form-label" style="margin-bottom:0;">filter by tag:</span>
                    <select id="file-filter-tag" class="select-minimal">
                        <option value="">all</option>
                    </select>
                </div>
                <div id="file-list" class="file-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/app.js?v=13"></script>
</body>
</html>
