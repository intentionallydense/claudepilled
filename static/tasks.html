<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tasks</title>
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tasks.css">
</head>
<body>
    <div id="tasks-page">
        <header class="tasks-header">
            <h1 class="tasks-title">tasks</h1>
            <nav class="tasks-nav">
                <a href="/" class="nav-link">chat</a>
                <a href="/briefing" class="nav-link">briefing</a>
                <a href="/couch" class="nav-link">couch</a>
                <a href="/settings" class="nav-link">settings</a>
            </nav>
        </header>

        <div class="tasks-toolbar">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">all</button>
                <button class="filter-btn" data-filter="active">active</button>
                <button class="filter-btn" data-filter="waiting">waiting</button>
                <select id="project-filter" class="filter-select">
                    <option value="">project</option>
                </select>
                <select id="tag-filter" class="filter-select">
                    <option value="">tag</option>
                </select>
            </div>
            <div style="display:flex;gap:0.5rem;">
                <button id="add-task-btn" class="btn-dark">+ add</button>
                <button id="brain-dump-btn" class="btn-dark">brain dump</button>
            </div>
        </div>

        <!-- Inline add form (hidden by default) -->
        <div id="add-form" class="task-form" style="display:none;">
            <div class="form-row">
                <input id="new-title" class="form-input" placeholder="task title..." />
                <select id="new-priority" class="form-select">
                    <option value="">priority</option>
                    <option value="H">high</option>
                    <option value="M">medium</option>
                    <option value="L">low</option>
                </select>
            </div>
            <textarea id="new-description" class="form-textarea" rows="2" placeholder="description (optional)..."></textarea>
            <div class="form-row">
                <div class="project-picker" id="new-project-picker">
                    <input class="form-input project-input" id="new-project-input" placeholder="project..." autocomplete="off" />
                    <div class="project-dropdown" id="new-project-dropdown"></div>
                </div>
                <div class="tag-picker tag-picker-compact" id="new-tag-picker">
                    <input class="tag-search-input" id="new-tag-input" placeholder="tags..." autocomplete="off" />
                    <div class="tag-dropdown" id="new-tag-dropdown"></div>
                </div>
                <input id="new-due" class="form-input form-input-date" type="date" />
                <input id="new-due-time" class="form-input form-input-time" type="time" placeholder="time" />
            </div>
            <div class="tag-chips-row" id="new-tag-chips"></div>
            <div class="form-row recurrence-row">
                <select id="new-recur-type" class="form-select">
                    <option value="">no repeat</option>
                    <option value="daily">every N days</option>
                    <option value="weekly">every N weeks</option>
                    <option value="monthly">every N months</option>
                    <option value="weekdays">days of week</option>
                </select>
                <div id="new-recur-detail" class="recur-detail"></div>
            </div>
            <div class="form-actions">
                <button id="save-task-btn" class="btn-dark">save</button>
                <button id="cancel-task-btn" class="text-btn">cancel</button>
            </div>
        </div>

        <!-- Task list -->
        <ul id="task-list" class="task-list"></ul>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state" style="display:none;">
            no tasks yet. add one or use brain dump to get started.
        </div>

        <!-- Completed today section -->
        <div id="completed-section" class="completed-section" style="display:none;">
            <div class="completed-header" id="completed-toggle">completed</div>
            <ul id="completed-list" class="completed-list"></ul>
        </div>

        <!-- Recently ingested emails -->
        <section id="ingestion-feed" class="ingestion-feed" style="display:none;">
            <div class="ingestion-header" id="ingestion-toggle">recently ingested</div>
            <ul id="ingestion-list" class="ingestion-list"></ul>
        </section>
    </div>
    <script src="/tasks.js"></script>
    <script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
